@if (visible) {
  <div class="network-error-container">
    <div class="network-error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Wi-Fi arc base lines with diagonal cross -->
        <line x1="1" y1="1" x2="23" y2="23" stroke-width="2"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <circle cx="12" cy="20" r="1" fill="currentColor"></circle>
      </svg>
    </div>
    <p class="network-error-title">Нет подключения к сети</p>
    <p class="network-error-subtitle">Проверьте подключение и повторите попытку</p>
    <button class="network-error-retry-btn" (click)="onRetry()" type="button">
      Повторить
    </button>
  </div>
}
