@if (isOpen) {
<div class="ui-modal-backdrop" (click)="onBackdropClick($event)">
  <div class="ui-modal-container" [class]="'ui-modal-size-' + size" (click)="$event.stopPropagation()">
    @if (title) {
    <div class="ui-modal-header">
      <h2 class="ui-modal-title">{{ title }}</h2>
      <button class="ui-modal-close-btn" (click)="closeModal()" aria-label="Закрыть" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    }
    <div class="ui-modal-content" [class.scroll-hidden]="!scrollable">
      <ng-content></ng-content>
    </div>
  </div>
</div>
}
